name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]
        include:
          - os: windows-latest
            compiler: msvc
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            export CC=clang
          else
            export CC=gcc
          fi
          cmake -B build -DMINIMP4_ENABLE_SANITIZERS=ON

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Configure with coverage
        run: cmake -B build -DMINIMP4_ENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors unused
          lcov --remove coverage.info '/usr/*' '*/tests/*' --output-file coverage.info --ignore-errors unused
          lcov --list coverage.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Check coverage threshold
        run: |
          COVERAGE=$(lcov --summary coverage.info 2>&1 | grep 'lines' | grep -oP '[\d.]+(?=%)')
          echo "Line coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 80" | bc -l)" -eq 1 ]; then
            echo "::warning::Coverage ${COVERAGE}% is below 80% threshold"
          fi

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build fuzz targets
        run: |
          CC=clang cmake -B build -DMINIMP4_ENABLE_FUZZING=ON
          cmake --build build --target fuzz_demux --target fuzz_mux_nal

      - name: Run fuzz_demux (60s)
        run: |
          mkdir -p corpus
          timeout 60 ./build/tests/fuzz_demux corpus/ || true

      - name: Run fuzz_mux_nal (60s)
        run: |
          mkdir -p corpus_nal
          timeout 60 ./build/tests/fuzz_mux_nal corpus_nal/ || true

  legacy-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build x86
        run: |
          gcc -flto -O3 -std=gnu11 -DNDEBUG -D_FILE_OFFSET_BITS=64 \
            -fno-stack-protector -ffunction-sections -fdata-sections -Wl,--gc-sections \
            -o minimp4_x86 minimp4_test.c -lm -lpthread

      - name: Run legacy tests
        run: |
          test_executable() {
            EXEC=$1
            $EXEC vectors/foreman.264 out.mp4
            cmp ./out.mp4 vectors/out_ref.mp4
            rm out.mp4
            $EXEC -s vectors/foreman.264 out.mp4
            cmp ./out.mp4 vectors/out_sequential_ref.mp4
            rm out.mp4
            $EXEC -f vectors/foreman.264 out.mp4
            cmp ./out.mp4 vectors/out_fragmentation_ref.mp4
            rm out.mp4
            $EXEC vectors/foreman_slices.264 out.mp4
            cmp ./out.mp4 vectors/out_slices_ref.mp4
            rm out.mp4
            $EXEC -d vectors/out_ref.mp4 out.h264
            cmp ./out.h264 vectors/foreman.264
            rm out.h264
            $EXEC -d vectors/out_sequential_ref.mp4 out.h264
            cmp ./out.h264 vectors/foreman.264
            rm out.h264
            $EXEC -d vectors/out_slices_ref.mp4 out.h264
            cmp ./out.h264 vectors/foreman_slices.264
            rm out.h264
          }
          test_executable ./minimp4_x86
          echo "All legacy tests passed"
